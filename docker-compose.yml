services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nexus-postgres
    environment:
      POSTGRES_DB: Nexusdb
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_pass
    ports:
      - "5432:5432"
    volumes:
      - nexus-pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - nexus-ollama:/root/.ollama

volumes:
  nexus-pgdata:
  nexus-ollama: